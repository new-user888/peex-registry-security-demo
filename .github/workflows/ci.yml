name: Build and push to ECR

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to build and push (e.g. v1.2.0). Leave empty to use the VERSION file."
        required: false
        default: ""

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC (no static keys)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_CI_ROLE_ARN }}
          aws-region: eu-central-1

      - name: Log in to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY_URL }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            VERSION="$INPUT_VERSION"
          else
            VERSION="v$(cat VERSION)"
          fi
          # repo has image_tag_mutability=IMMUTABLE, so a given tag can only be pushed
          # once - pick a version that hasn't been pushed yet (dispatch input or bump VERSION).
          docker build -t "$ECR_REPOSITORY:$VERSION" .
          docker push "$ECR_REPOSITORY:$VERSION"
